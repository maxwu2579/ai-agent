<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Assistant </title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f5f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #111827;
        }

        #app {
            width: min(900px, 94vw);
            height: 86vh;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 18px 22px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .title strong {
            font-size: 18px;
        }

        .title span {
            font-size: 13px;
            color: #6b7280;
        }

        .reset-btn {
            border: 1px solid #e5e7eb;
            background: #ffffff;
            color: #374151;
            border-radius: 10px;
            padding: 8px 12px;
            cursor: pointer;
        }

        .reset-btn:hover {
            background: #f9fafb;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background:
                radial-gradient(circle at top left, rgba(79, 70, 229, 0.06), transparent 28%),
                #ffffff;
        }

        .msg {
            max-width: 78%;
            padding: 12px 14px;
            border-radius: 14px;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 14px;
        }

        .msg.user {
            align-self: flex-end;
            background: #111827;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg.bot {
            align-self: flex-start;
            background: #f3f4f6;
            color: #111827;
            border-bottom-left-radius: 4px;
        }

        .msg.tool {
            align-self: flex-start;
            max-width: 86%;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #7c2d12;
            font-size: 13px;
        }

        .msg.error {
            align-self: flex-start;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        .tool-name {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .tool-result {
            margin-top: 6px;
            color: #9a3412;
            opacity: 0.95;
        }

        .typing {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            color: #6b7280;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: currentColor;
            border-radius: 50%;
            animation: blink 1s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.15s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-2px); }
        }

        .input-area {
            padding: 16px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
            background: #ffffff;
        }

        input {
            flex: 1;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 12px 14px;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: #111827;
        }

        button.send-btn {
            border: none;
            background: #111827;
            color: white;
            padding: 0 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        button.send-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .examples {
            padding: 0 16px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            border: 1px solid #e5e7eb;
            background: #f9fafb;
            color: #374151;
            border-radius: 999px;
            padding: 7px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .chip:hover {
            background: #f3f4f6;
        }

        @media (max-width: 640px) {
            #app {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }

            .msg {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        <div class="title">
            <strong>🤖 AI Agent Assistant </strong>
            <span>Shows tool calls · Real API data · SSE streaming</span>
        </div>
        <button class="reset-btn" @click="resetChat" :disabled="loading">New chat</button>
    </div>

    <div class="messages" ref="messagesBox">
        <div v-for="(m, i) in messages" :key="i" :class="['msg', m.role]">
            <template v-if="m.role === 'tool'">
                <div class="tool-name">{{ m.content }}</div>
                <div v-if="m.result" class="tool-result">{{ m.result }}</div>
            </template>
            <template v-else>
                {{ m.content }}
            </template>
        </div>

        <div v-if="loading && !streamingStarted" class="msg bot">
            <span class="typing">
                Thinking <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </span>
        </div>
    </div>

    <div class="examples">
        <button class="chip" @click="useExample('What is the weather in Kuala Lumpur now?')">Weather demo</button>
        <button class="chip" @click="useExample('Convert USD to MYR using the latest exchange rate.')">Exchange rate demo</button>
        <button class="chip" @click="useExample('Search the latest news about AI agents.')">Search demo</button>
    </div>

    <div class="input-area">
        <input
            v-model="input"
            @keyup.enter="send"
            placeholder="Ask about weather, exchange rates, or latest information..."
            :disabled="loading"
        >
        <button class="send-btn" @click="send" :disabled="loading || !input.trim()">Send</button>
    </div>
</div>

<script>
const { createApp, ref, nextTick } = Vue;

createApp({
    setup() {
        const input = ref("");
        const messages = ref([]);
        const messagesBox = ref(null);
        const loading = ref(false);
        const streamingStarted = ref(false);
        const sessionId = ref(localStorage.getItem("agent_session_id") || "");

        async function scrollToBottom() {
            await nextTick();
            if (messagesBox.value) {
                messagesBox.value.scrollTop = messagesBox.value.scrollHeight;
            }
        }

        function useExample(text) {
            if (loading.value) return;
            input.value = text;
        }

        function pushError(message) {
            messages.value.push({ role: "error", content: message });
        }

        function parseSSE(buffer, onEvent) {
            const parts = buffer.split("\n\n");
            const remaining = parts.pop();

            for (const part of parts) {
                const line = part.split("\n").find(l => l.startsWith("data: "));
                if (!line) continue;

                try {
                    onEvent(JSON.parse(line.slice(6)));
                } catch (error) {
                    console.error("Failed to parse SSE event:", error, line);
                }
            }

            return remaining;
        }

        async function send() {
            const userText = input.value.trim();
            if (!userText || loading.value) return;

            input.value = "";
            loading.value = true;
            streamingStarted.value = false;

            messages.value.push({ role: "user", content: userText });
            await scrollToBottom();

            let assistantIndex = null;

            try {
                const response = await fetch("http://127.0.0.1:5000/chat_stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: userText,
                        session_id: sessionId.value
                    })
                });

                if (!response.ok || !response.body) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";

                const handleEvent = (event) => {
                    if (event.type === "session") {
                        sessionId.value = event.session_id;
                        localStorage.setItem("agent_session_id", event.session_id);
                    }

                    if (event.type === "tool_start") {
                        messages.value.push({
                            role: "tool",
                            content: event.message || `Running ${event.name}...`,
                            result: ""
                        });
                    }

                    if (event.type === "tool_result") {
                        const lastTool = [...messages.value].reverse().find(m => m.role === "tool" && !m.result);
                        if (lastTool) {
                            lastTool.result = `Result: ${event.result}`;
                        }
                    }

                    if (event.type === "content") {
                        streamingStarted.value = true;
                        if (assistantIndex === null) {
                            assistantIndex = messages.value.length;
                            messages.value.push({ role: "bot", content: "" });
                        }
                        messages.value[assistantIndex].content += event.content;
                    }

                    if (event.type === "error") {
                        pushError(event.message || "Unknown error.");
                    }
                };

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    buffer = parseSSE(buffer, handleEvent);
                    await scrollToBottom();
                }
            } catch (error) {
                pushError("Error: " + error.message);
            } finally {
                loading.value = false;
                streamingStarted.value = false;
                await scrollToBottom();
            }
        }

        async function resetChat() {
            try {
                await fetch("http://127.0.0.1:5000/reset", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: sessionId.value })
                });
            } catch (error) {
                console.warn(error);
            }

            sessionId.value = "";
            localStorage.removeItem("agent_session_id");
            messages.value = [];
        }

        return {
            input,
            messages,
            messagesBox,
            loading,
            streamingStarted,
            send,
            resetChat,
            useExample
        };
    }
}).mount("#app");
</script>
</body>
</html>
