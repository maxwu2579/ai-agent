<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent 助手</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #app {
            width: 600px;
            height: 80vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #4f46e5;
            color: white;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .msg.user {
            background: #4f46e5;
            color: white;
            align-self: flex-end;
        }
        .msg.bot {
            background: #f0f2f5;
            color: #333;
            align-self: flex-start;
        }
        .msg.loading { color: #999; font-style: italic; }
        .input-area {
            display: flex;
            padding: 16px;
            gap: 8px;
            border-top: 1px solid #eee;
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .input-area input:focus { border-color: #4f46e5; }
        .input-area button {
            padding: 10px 20px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">🤖 AI Agent 助手</div>
        <div class="messages" ref="messagesBox">
            <div v-for="(m, i) in displayMessages" :key="i" :class="['msg', m.role]">
                {{ m.content }}
            </div>
            <div v-if="loading" class="msg bot loading">思考中...</div>
        </div>
        <div class="input-area">
            <input
                v-model="input"
                @keyup.enter="send"
                placeholder="问我天气、汇率，或搜索任何信息..."
                :disabled="loading"
            >
            <button @click="send" :disabled="loading || !input">发送</button>
        </div>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue;

        createApp({
            setup() {
                const input = ref("");
                const loading = ref(false);
                const displayMessages = ref([]);
                const history = ref([]);
                const messagesBox = ref(null);

                async function scrollToBottom() {
                    await nextTick();
                    if (messagesBox.value) {
                        messagesBox.value.scrollTop = messagesBox.value.scrollHeight;
                    }
                }

                async function send() {
                    if (!input.value || loading.value) return;

                    const userMsg = input.value;
                    displayMessages.value.push({ role: "user", content: userMsg });
                    input.value = "";
                    loading.value = true;
                    scrollToBottom();

                    try {
                        const res = await fetch("http://127.0.0.1:5000/chat", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                message: userMsg,
                                history: history.value,
                            }),
                        });
                        const data = await res.json();
                        displayMessages.value.push({ role: "bot", content: data.reply });
                        history.value = data.history;
                    } catch (e) {
                        displayMessages.value.push({ role: "bot", content: "出错了：" + e.message });
                    } finally {
                        loading.value = false;
                        scrollToBottom();
                    }
                }

                return { input, loading, displayMessages, send, messagesBox };
            }
        }).mount("#app");
    </script>
</body>
</html>
